name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/beandebug-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/beandebug-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # clone or pull
            if [ ! -d /home/ec2-user/beandebug/.git ]; then
              git clone https://github.com/sconoscituo/Project_beandebug.git /home/ec2-user/beandebug
            fi

            cd /home/ec2-user/beandebug
            git pull origin main

            # inject env
            cat > .env << 'ENVEOF'
            DB_USER=${{ secrets.DATABASE_USER }}
            DB_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            DB_NAME=${{ secrets.DATABASE_NAME }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            ENVEOF
            sed -i 's/^            //' .env

            # pull images
            docker pull ${{ secrets.DOCKER_USERNAME }}/beandebug-api:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/beandebug-frontend:latest

            # restart
            docker-compose -f docker-compose.prod.yml down
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker-compose -f docker-compose.prod.yml up -d

            # wait for API to be ready
            echo "Waiting for API health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "API is healthy!"
                break
              fi
              echo "Attempt $i/30..."
              sleep 2
            done

            # seed database (idempotent - skips if already seeded)
            echo "Seeding database..."
            curl -sf -X POST http://localhost:8000/seed || echo "Seed request sent"

            # cleanup
            docker image prune -f

            # verify
            echo "===== deploy done ====="
            docker-compose -f docker-compose.prod.yml ps
