services:
  db:
    image: postgres:15-alpine
    container_name: beandebug_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beandebug-network

  api:
    image: sconosciuto/beandebug-api:latest
    container_name: beandebug_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - APP_NAME=${APP_NAME:-Bean Debug}
      - DEBUG=False
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:80}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - beandebug-network

  frontend:
    image: sconosciuto/beandebug-frontend:latest
    container_name: beandebug-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - beandebug-network

volumes:
  postgres_data:

networks:
  beandebug-network:
    driver: bridge
