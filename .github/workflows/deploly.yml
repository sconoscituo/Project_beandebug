name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/beandebug-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/beandebug-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 레포 없으면 클론, 있으면 pull
            if [ ! -d /home/ec2-user/beandebug/.git ]; then
              git clone https://github.com/sconoscituo/Project_beandebug.git /home/ec2-user/beandebug
            fi

            cd /home/ec2-user/beandebug
            git pull origin main

            # Docker Hub에서 최신 이미지 pull
            docker pull ${{ secrets.DOCKER_USERNAME }}/beandebug-api:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/beandebug-frontend:latest

            # 컨테이너 재시작
            docker-compose -f docker-compose.prod.yml down
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker-compose -f docker-compose.prod.yml up -d

            # 오래된 이미지 정리
            docker image prune -f

            # 배포 결과 확인
            echo "===== 배포 완료 ====="
            docker-compose -f docker-compose.prod.yml ps
